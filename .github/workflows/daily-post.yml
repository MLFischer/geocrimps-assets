name: GeoCrimps daily post

on:
  schedule:
    # 16:00 UTC = 18:00 CEST (summer) / 17:00 CET (winter). GitHub cron is UTC only.
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not actually post)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: geocrimps-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Publish next post
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python publish.py --dry-run
          else
            python publish.py
          fi

      - name: Commit updated queue
        if: ${{ always() && inputs.dry_run != true }}        run: |
          if git diff --quiet -- queue.json; then
            echo "No queue change to commit."
          else
            git config user.name "geocrimps-bot"
            git config user.email "actions@github.com"
            git add queue.json
            git commit -m "Publish next post [skip ci]"
            git push
          fi
